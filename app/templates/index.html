<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Price Predictor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Stock Price Predictor</h1>
      <p>
        Enter a stock ticker and run an ML prediction for next-day gain
        probability based on historical OHLCV behavior.
      </p>

      <form id="predict-form">
        <label for="symbol">Stock ticker symbol</label>
        <input id="symbol" name="symbol" type="text" placeholder="AAPL" required />

        <label for="lookback_years">Historical window (years)</label>
        <select id="lookback_years" name="lookback_years">
          <option value="5">5 years</option>
          <option value="8" selected>8 years</option>
          <option value="10">10 years</option>
          <option value="12">12 years</option>
        </select>

        <button type="submit">Run Prediction</button>
      </form>

      <section>
        <h2>Prediction Result</h2>
        <pre id="output">Your prediction output will appear here.</pre>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
  </html>
